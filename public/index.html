<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Real-time Video Stream Theater</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: auto; max-width: 300px; z-index: 100; }
        h1 { margin: 0 0 5px 0; font-size: 16px; }
        p { margin: 0; font-size: 11px; color: #ccc; line-height: 1.4; }

        /* 3D空間に配置するしあtube専用コンテナ */
        .theater-container {
            width: 1280px;
            height: 720px;
            background: #000;
            border: 2px solid #5865F2;
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.5);
            border-radius: 12px;
            overflow: hidden;
        }
        .theater-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <!-- Three.js ＆ 立体操作・HTML要素3D配置用ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
</head>
<body>
    <div id="info">
        <h1>3D 規制解除シアター</h1>
        <p>3D空間内に「しあtube」のコアシステムを完全統合しました。学校のブロックやYouTubeの制限をすべてスルーして、画面内の検索や再生を自由に行えます。</p>
        <p style="margin-top: 5px; color: #5865F2;">※ドラッグでカメラ回転、ホイールでズーム</p>
    </div>

    <script>
        // 1. 3D空間とCSS3Dレンダラーの初期化
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 5000);
        camera.position.set(0, 0, 1000);

        const rendererCSS = new THREE.CSS3DRenderer();
        rendererCSS.setSize(window.innerWidth, window.innerHeight);
        rendererCSS.domElement.style.position = 'absolute';
        rendererCSS.domElement.style.top = '0';
        document.body.appendChild(rendererCSS.domElement);

        const controls = new THREE.OrbitControls(camera, rendererCSS.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 2. しあtubeを埋め込んだDOM要素を作成して3Dオブジェクト化
        const container = document.createElement('div');
        container.className = 'theater-container';

        const iframe = document.createElement('iframe');
        // 自分のサーバーから中継されるしあtubeのコアシステムを読み込む
        iframe.src = '/siatube-core';
        iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
        iframe.allowFullscreen = true;
        container.appendChild(iframe);

        // HTML要素をそのままThree.jsの3D空間に配置可能なオブジェクトへ変換
        const objectCSS = new THREE.CSS3DObject(container);
        objectCSS.position.set(0, 0, 0);
        scene.add(objectCSS);

        // 天体（太陽系など）は完全に消去された状態を維持

        // 3. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            rendererCSS.render(scene, camera);
        }
        animate();

        // 画面リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            rendererCSS.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
