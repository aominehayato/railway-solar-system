<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Real-time Video Stream Theater</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: auto; max-width: 300px; z-index: 100; }
        h1 { margin: 0 0 10px 0; font-size: 16px; }
        .input-group { display: flex; gap: 5px; margin-top: 10px; }
        input[type="text"] { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 5px; border-radius: 4px; font-size: 12px; }
        button { background: #5865F2; border: none; color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        button:hover { background: #4752C4; }
        
        /* YouTubeプレイヤー自体を真の動画データのように見せるためのマスク設定 */
        .video-container {
            width: 1280px;
            height: 720px;
            background: #000;
            pointer-events: none; /* 3D空間でのカメラ操作を邪魔しない */
        }
        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <!-- Three.js ＆ カメラ操作用ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- HTML要素を3D空間にシームレスに配置するCSS3DRenderer -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
    <!-- YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div id="info">
        <h1>独自3D動画ストリームシアター</h1>
        <div>
            <label style="font-size: 12px; color: #ccc;">YouTube URL (Shorts対応):</label>
            <div class="input-group">
                <input type="text" id="ytUrl" placeholder="https://www.youtube.com/watch?v=... または /shorts/...">
                <button id="playBtn">再生</button>
            </div>
        </div>
    </div>

    <script>
        // 1. 3D空間と2つのレンダラーのセットアップ
        const scene = new THREE.Scene();
        
        // 通常のWebGL空間（背景やエフェクト用）
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 800);

        // HTML要素を立体配置するCSS3Dレンダラー
        const rendererCSS = new THREE.CSS3DRenderer();
        rendererCSS.setSize(window.innerWidth, window.innerHeight);
        rendererCSS.domElement.style.position = 'absolute';
        rendererCSS.domElement.style.top = '0';
        document.body.appendChild(rendererCSS.domElement);

        // カメラ操作設定
        const controls = new THREE.OrbitControls(camera, rendererCSS.domElement);
        controls.update();

        // 2. 独自配信用スクリーンのHTML要素を3Dオブジェクト化
        const videoContainer = document.createElement('div');
        videoContainer.className = 'video-container';
        
        // 中にYouTubeの埋め込み用ターゲットを配置
        const ytDiv = document.createElement('div');
        ytDiv.id = 'ytPlayer';
        videoContainer.appendChild(ytDiv);

        // CSS3Dオブジェクトとしてシーンに追加
        const objectCSS = new THREE.CSS3DObject(videoContainer);
        objectCSS.position.set(0, 0, 0);
        scene.add(objectCSS);

        // 3. YouTube IFrame API の制御ロジック
        let player;
        
        function onYouTubeIframeAPIReady() {
            window.ytPlayerReady = true;
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            const url = document.getElementById('ytUrl').value;
            if (!url) return alert('YouTubeのURLを入力してください');

            const videoId = extractVideoId(url);
            if (!videoId) return alert('有効なYouTubeのURLが見つかりませんでした');

            if (player) {
                player.loadVideoById(videoId);
            } else {
                player = new YT.Player('ytPlayer', {
                    height: '720',
                    width: '1280',
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,          // 既存のシークバーやコントロールを完全に非表示
                        'rel': 0,
                        'showinfo': 0,
                        'modestbranding': 1,    // YouTubeロゴを最小限にする
                        'playsinline': 1,
                        'iv_load_policy': 3,
                        'cc_load_policy': 0
                    },
                    events: {
                        'onReady': (event) => {
                            event.target.playVideo();
                        }
                    }
                });
            }
        });

        // 4. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            rendererCSS.render(scene, camera);
        }
        animate();

        // 画面リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            rendererCSS.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
