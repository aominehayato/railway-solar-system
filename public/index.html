<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Real-time Video Stream Theater</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: auto; max-width: 300px; z-index: 100; }
        h1 { margin: 0 0 5px 0; font-size: 16px; }
        p { margin: 0; font-size: 12px; color: #ccc; }
        
        /* 3D空間内に配置するしあtubeコンテナのスタイル設定 */
        .theater-container {
            width: 1280px;
            height: 720px;
            background: #111;
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.3);
            pointer-events: auto; /* 3D空間内での操作を有効化 */
        }
        .theater-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <!-- Three.js ＆ 立体制御ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- HTML要素（しあtube）をWebGL空間に完全同期させるCSS3DRenderer -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
</head>
<body>
    <div id="info">
        <h1>独自3D規制スルーシアター</h1>
        <p>しあtubeのバイパスシステムを3D空間へ完全統合しました。画面内の検索窓から自由に動画を再生・視聴できます。</p>
    </div>

    <script>
        // 1. 3D空間とカメラ、CSS3Dレンダラーのセットアップ
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 800);

        const rendererCSS = new THREE.CSS3DRenderer();
        rendererCSS.setSize(window.innerWidth, window.innerHeight);
        rendererCSS.domElement.style.position = 'absolute';
        rendererCSS.domElement.style.top = '0';
        document.body.appendChild(rendererCSS.domElement);

        // マウスやトラックパッドでの視点操作
        const controls = new THREE.OrbitControls(camera, rendererCSS.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 2. しあtubeの仕組みを持ったHTMLを埋め込むコンテナを作成
        const theaterContainer = document.createElement('div');
        theaterContainer.className = 'theater-container';
        
        // しあtube（AJGPW版）のバイパスシステムURLをそのままインラインフレームとして読み込み
        const iframe = document.createElement('iframe');
        iframe.src = 'https://raw.githack.com/ajgpw/youtube/main/index.html.txt';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        iframe.allowFullscreen = true;
        theaterContainer.appendChild(iframe);

        // 3. CSS3Dオブジェクトとして3D空間のセンターに配置
        const objectCSS = new THREE.CSS3DObject(theaterContainer);
        objectCSS.position.set(0, 0, 0);
        scene.add(objectCSS);

        // 4. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            rendererCSS.render(scene, camera);
        }
        animate();

        // 画面リサイズへの自動追従設定
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            rendererCSS.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
