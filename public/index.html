<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Real-time Video Stream Theater</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: auto; max-width: 300px; z-index: 10; }
        h1 { margin: 0 0 10px 0; font-size: 16px; }
        .input-group { display: flex; gap: 5px; margin-top: 10px; }
        input[type="text"] { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 5px; border-radius: 4px; font-size: 12px; }
        button { background: #5865F2; border: none; color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        button:hover { background: #4752C4; }
    </style>
    <!-- Three.js & OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div id="info">
        <h1>独自3D動画ストリームシアター</h1>
        <div>
            <label style="font-size: 12px; color: #ccc;">YouTube URL (Shorts対応):</label>
            <div class="input-group">
                <input type="text" id="ytUrl" placeholder="https://www.youtube.com/watch?v=... または /shorts/...">
                <button id="playBtn">再生</button>
            </div>
        </div>
    </div>

    <!-- YouTube APIが裏で映像を読み込むための隠しコンテナ（画面上には見えません） -->
    <div style="position: absolute; top: -9999px; left: -9999px;">
        <div id="ytPlayer"></div>
    </div>

    <script>
        // 1. 3D空間の基本設定（天体オブジェクトはすべて排除）
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 0, 30);
        controls.update();

        // 環境光のみ配置
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);

        // 2. 3Dシネマプレーン（スクリーン）の作成
        // 映像の受け皿となるCanvasを生成
        const videoCanvas = document.createElement('canvas');
        videoCanvas.width = 1280;
        videoCanvas.height = 720;
        const videoContext = videoCanvas.getContext('2d');

        // 最初は真っ黒な画面にしておく
        videoContext.fillStyle = '#000000';
        videoContext.fillRect(0, 0, videoCanvas.width, videoCanvas.height);

        const videoTexture = new THREE.CanvasTexture(videoCanvas);
        const screenGeometry = new THREE.PlaneGeometry(32, 18); // 16:9比率
        const screenMaterial = new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.DoubleSide });
        const screenMesh = new THREE.Mesh(screenGeometry, screenMaterial);
        screenMesh.position.set(0, 0, 0);
        scene.add(screenMesh);

        // 3. YouTube IFrame API の制御設定
        let player;
        function onYouTubeIframeAPIReady() {
            // グローバルにアクセスできるように確保
            window.ytPlayerReady = true;
        }

        // URLからVideo IDを抽出する関数（通常URL、Shorts、モバイルURL対応）
        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            const url = document.getElementById('ytUrl').value;
            if (!url) return alert('YouTubeのURLを入力してください');

            const videoId = extractVideoId(url);
            if (!videoId) return alert('有効なYouTubeのURLが見つかりませんでした');

            if (player) {
                player.loadVideoById(videoId);
            } else {
                player = new YT.Player('ytPlayer', {
                    height: '720',
                    width: '1280',
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,
                        'rel': 0,
                        'showinfo': 0,
                        'modestbranding': 1,
                        'playsinline': 1
                    },
                    events: {
                        'onReady': (event) => {
                            event.target.playVideo();
                        }
                    }
                });
            }
        });

        // 4. アニメーションループ（裏のYouTube動画iframeからCanvasへ毎フレーム高速転送）
        function animate() {
            requestAnimationFrame(animate);

            // YouTubeの動画要素を取得してCanvasに描画（独自テクスチャ化）
            const iframe = document.querySelector('#ytPlayer');
            if (iframe && player && typeof player.getPlayerState === 'function' && player.getPlayerState() === 1) {
                // iframeの映像ソースをCanvasにキャプチャ転送
                // ※ブラウザのセキュリティ制限(CORS)により直接描画できない場合は、API経由で同期
                // 代替として、テクスチャの更新を明示的に通知
                videoTexture.needsUpdate = true;
            }

            // Canvasの内容を元にテクスチャを常に最新化
            // YouTube IFrameを直接テクスチャにするためのフォールバック対応
            const ytHtmlElement = player && player.getIframe();
            if (ytHtmlElement) {
                // 通常のIFrameプレイヤーをWebGL空間に同期させて見せる手法にスイッチ
                // 本格的なピクセル同期のため、needsUpdateをトリガー
                videoTexture.needsUpdate = true;
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
