<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Real-time Solar System & Private Stream</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: auto; max-width: 300px; }
        h1 { margin: 0 0 5px 0; font-size: 16px; }
        p { margin: 0 0 10px 0; font-size: 12px; color: #aaa; }
        .input-group { display: flex; gap: 5px; margin-top: 10px; }
        input[type="text"] { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 5px; border-radius: 4px; font-size: 12px; }
        button { background: #5865F2; border: none; color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        button:hover { background: #4752C4; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="info">
        <h1>リアルタイム 3D太陽系 & 独自配信</h1>
        <p id="datetime">データ受信中...</p>
        
        <div style="border-top: 1px solid #444; padding-top: 10px;">
            <label style="font-size: 12px; color: #ccc;">独自ストリーム再生 (YouTube URL):</label>
            <div class="input-group">
                <input type="text" id="ytUrl" placeholder="https://www.youtube.com/watch?v=...">
                <button id="playBtn">再生</button>
            </div>
        </div>
    </div>

    <!-- 映像処理用の隠しVideo要素（ここからストリームを読み込んで3D空間に投影する） -->
    <video id="videoElement" crossorigin="anonymous" playsinline style="display:none;"></video>

    <script>
        // 1. 3D空間の基本設定
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 40, 60);
        controls.update();

        // 2. 光源の設定
        const ambientLight = new THREE.AmbientLight(0x444444);
        scene.add(ambientLight);
        const sunLight = new THREE.PointLight(0xffffff, 2, 300);
        scene.add(sunLight);

        // 3. 太陽の作成
        const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // 4. 宇宙空間に浮かぶ動画スクリーンの作成
        const video = document.getElementById('videoElement');
        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;
        videoTexture.format = THREE.RGBFormat;

        // 16:9 の巨大なシアタースクリーンを生成
        const screenGeometry = new THREE.PlaneGeometry(24, 13.5);
        const screenMaterial = new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.DoubleSide });
        const screenMesh = new THREE.Mesh(screenGeometry, screenMaterial);
        screenMesh.position.set(0, 15, -20); // 太陽の少し上奥に配置
        scene.add(screenMesh);

        // 5. 惑星の設定
        const planetSettings = {
            Mercury: { color: 0xaaaaaa, size: 0.4 },
            Venus:   { color: 0xe3bb76, size: 0.7 },
            Earth:   { color: 0x2277ff, size: 0.8 },
            Mars:    { color: 0xcc4400, size: 0.5 },
            Jupiter: { color: 0xd4a373, size: 1.8 },
            Saturn:  { color: 0xf4e2bb, size: 1.5 },
            Uranus:  { color: 0x70d6ff, size: 1.2 },
            Neptune: { color: 0x3a86ff, size: 1.1 }
        };

        const planetMeshes = {};

        Object.keys(planetSettings).forEach(name => {
            const config = planetSettings[name];
            const geometry = new THREE.SphereGeometry(config.size, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: config.color, roughness: 0.5 });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            planetMeshes[name] = mesh;
        });

        // 6. WebSocket 天体位置同期
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}`);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            document.getElementById('datetime').innerText = `現在天体時刻: ${new Date(data.time).toLocaleString()}`;

            const scale = 15;
            Object.keys(data.planets).forEach(name => {
                const pos = data.planets[name];
                if (planetMeshes[name]) {
                    planetMeshes[name].position.set(pos.x * scale, pos.z * scale, pos.y * scale);
                }
            });
        };

        // 7. 独自ストリームの再生制御
        document.getElementById('playBtn').addEventListener('click', () => {
            const url = document.getElementById('ytUrl').value;
            if (!url) return alert('YouTubeのURLを入力してください');

            // サーバーの自前ストリーミングAPIをソースに指定
            video.src = `/api/stream?url=${encodeURIComponent(url)}`;
            video.load();
            video.play().catch(err => {
                console.error("Playback failed:", err);
                alert("再生を開始するには、画面を一度クリックしてください。");
            });
        });

        // 8. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            sun.rotation.y += 0.002;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
