<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独自規制回避プレイヤー (2D)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #container {
            width: 90%;
            max-width: 1000px;
            background: #000;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 5px;
            text-align: center;
        }
        #statusText {
            font-size: 13px;
            color: #5865F2;
            text-align: center;
            margin-bottom: 15px;
            min-height: 18px;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #5865F2;
        }
        button {
            background: #5865F2;
            border: none;
            color: #fff;
            padding: 0 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #4752C4;
        }
        .player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 アスペクト比 */
            background: #050505;
            border-radius: 6px;
            overflow: hidden;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            outline: none;
        }
    </style>
</head>
<body>

<div id="container">
    <h1>完全独自ビルド 2D規制回避シアター</h1>
    <div id="statusText">YouTubeの動画URLまたはShortsのURLを入力してください</div>

    <div class="input-area">
        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=HqG-fKWkK5s">
        <button id="playBtn">動画を解析して再生</button>
    </div>

    <div class="player-wrapper">
        <!-- 規制スルーされた映像データを直接受け止めるビデオタグ（コントロールバー付き） -->
        <video id="mainPlayer" controls autoplay playsinline crossorigin="anonymous"></video>
    </div>
</div>

<script>
    // しあtube系クローンが通信を確立するために利用している、CORS解放済みの安定したPiped/Invidious APIエンドポイントのリスト
    const BYPASS_APIS = [
        'https://pipedapi.kavin.rocks',
        'https://api.piped.projectsegfau.lt',
        'https://pipedapi.tokhmi.xyz',
        'https://piped-api.garudalinux.org',
        'https://invidious.asir.dev'
    ];

    // URLから動画IDを確実に抽出する関数
    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    document.getElementById('playBtn').addEventListener('click', async () => {
        const url = document.getElementById('videoUrl').value;
        if (!url) return alert('URLを入力してください');

        const videoId = extractVideoId(url);
        if (!videoId) return alert('有効なYouTubeの動画IDを検出できませんでした。');

        const status = document.getElementById('statusText');
        const player = document.getElementById('mainPlayer');
        
        status.innerText = '制限回避ネットワークに接続を開始しています...';

        // 外部のCORS解放済みAPI群を順にフェッチして動画ストリームを奪取する
        for (const apiBase of BYPASS_APIS) {
            try {
                status.innerText = `回避ルートを検証中: ${apiBase.replace('https://', '')}`;
                
                // Piped APIのエンドポイント構造を利用して動画の生データを要求
                const apiUrl = `${apiBase}/streams/${videoId}`;
                const response = await fetch(apiUrl, { signal: AbortSignal.timeout(5000) });
                
                if (!response.ok) continue;

                const data = await response.json();
                
                // 映像と音声が合体しているビデオストリームを走査
                if (data && data.videoStreams && data.videoStreams.length > 0) {
                    // 最も標準的で扱いやすい高品質なmp4/hlsストリームを選択
                    const mp4Streams = data.videoStreams.filter(s => s.videoOnly === false);
                    const targetStream = mp4Streams.length > 0 ? mp4Streams[0] : data.videoStreams[0];

                    if (targetStream && targetStream.url) {
                        status.style.color = '#43b581';
                        status.innerText = `再生中: ${data.title || '制限バイパス動画'}`;
                        
                        // 3Dではなく、通常のvideoタグのsrcへ生ストリームを流し込む
                        player.src = targetStream.url;
                        player.load();
                        player.play().catch(e => {
                            console.log("Autoplay blocked, waiting for user click.");
                        });
                        return; // 成功したため処理を終了
                    }
                }
            } catch (e) {
                console.warn(`Bypass endpoint failed: ${apiBase}`, e);
                // 通信エラーやタイムアウトが発生した場合は、次のAPIへ自動的にフォールバック
            }
        }

        status.style.color = '#f04747';
        status.innerText = 'すべての回避ルートが規制されました。別のURLで再度お試しください。';
    });
</script>

</body>
</html>
